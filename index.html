<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Drive | The Golden Era</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
</head>
<body>

<div class="main-wrapper">
    <div class="ornament-top"></div>

    <nav class="royal-nav">
        <div class="nav-links">
            <a href="#">HOME</a>
            <a href="#">COLLECTION</a>
            <a href="#">HISTORY</a>
        </div>
        <div class="logo-box">
            <h1>ROYAL DRIVE</h1>
            <span>ESTD 1926</span>
        </div>
        <div class="nav-right">
            <button id="theme-toggle">🌓 SWITCH MODE</button>
        </div>
    </nav>

    <section class="grand-collection">
        <h2 class="section-divider"><span>WORLD'S SAFEST CARS</span></h2>
        <div class="car-container">
            <div class="car-item" onclick="openDetails('Volvo XC90', 'Safe as a vault. Features include Pilot Assist, 360 Camera, and Emergency Braking.', '₹1.1 Cr', 'https://images.unsplash.com/photo-1549399542-7e3f8b79c341')">
                <div class="img-frame">
                    <img src="https://images.unsplash.com/photo-1549399542-7e3f8b79c341?w=500" alt="Volvo">
                </div>
                <h3>Volvo XC90</h3>
                <p>Safety: 5 Star ★ | ₹1.1 Cr</p>
            </div>
            <div class="car-item" onclick="openDetails('Mercedes S-Class Guard', 'Bulletproof and blast-proof. Used by world leaders for ultimate safety.', '₹12 Cr', 'https://images.unsplash.com/photo-1606611013016-969c19ba27bb')">
                <div class="img-frame">
                    <img src="https://images.unsplash.com/photo-1606611013016-969c19ba27bb?w=500" alt="Mercedes">
                </div>
                <h3>Mercedes Guard</h3>
                <p>Safety: VR10 Certified | ₹12 Cr</p>
            </div>
        </div>

        <h2 class="section-divider"><span>SPEED & PRICE KINGS</span></h2>
        <div class="car-container">
            <div class="car-item" onclick="openDetails('Bugatti Chiron', 'The pinnacle of speed. 1500 Horsepower with a top speed of 490 km/h.', '₹21 Cr', 'https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e')">
                <div class="img-frame"><img src="https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e?w=500"></div>
                <h3>Bugatti Chiron</h3>
                <p>Speed: 490km/h | ₹21 Cr</p>
            </div>
        </div>
    </section>

    <div id="carModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <img id="modalImg" src="" alt="Car Image">
            <h2 id="modalTitle"></h2>
            <p id="modalPrice" class="gold-text"></p>
            <p id="modalDesc"></p>
            <button class="inquiry-btn">Enquire Now</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
